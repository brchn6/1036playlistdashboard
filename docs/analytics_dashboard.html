<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        /* Login Screen */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1em;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-label {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .table-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }
        
        .table-card h3 {
            margin-bottom: 20px;
            color: #667eea;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            color: #667eea;
            font-weight: 600;
        }
        
        td {
            color: #e0e0e0;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .logout-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h2>🔒 Analytics Dashboard</h2>
        <div id="loginError" class="error" style="display: none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <button class="logout-btn" onclick="logout()">Logout</button>
        
        <div class="container">
            <header>
                <h1>📊 Radio Analytics Dashboard</h1>
                <p class="subtitle">Internal monitoring platform</p>
            </header>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Visits Today</div>
                    <div class="stat-value" id="visitsToday">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Visits</div>
                    <div class="stat-value" id="visitsTotal">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Session Duration</div>
                    <div class="stat-value" id="avgDuration">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Unique Sessions Today</div>
                    <div class="stat-value" id="uniqueSessions">-</div>
                </div>
            </div>
            
            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Visits Timeline (Last 7 Days)</h3>
                    <div class="chart-container">
                        <canvas id="timelineChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Visits by Country</h3>
                    <div class="chart-container">
                        <canvas id="countryChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Recent Events Table -->
            <div class="table-card">
                <h3>Recent Events</h3>
                <div id="eventsTable">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let token = localStorage.getItem('analytics_token');
        let timelineChart = null;
        let countryChart = null;
        
        // Check if already authenticated
        if (token) {
            showDashboard();
        }
        
        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (!response.ok) {
                    throw new Error('Invalid credentials');
                }
                
                const data = await response.json();
                token = data.access_token;
                localStorage.setItem('analytics_token', token);
                
                showDashboard();
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
                document.getElementById('loginError').style.display = 'block';
            }
        });
        
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadDashboardData();
        }
        
        function logout() {
            localStorage.removeItem('analytics_token');
            token = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }
        
        async function loadDashboardData() {
            try {
                // Load all data in parallel
                const [summary, timeline, country, recent] = await Promise.all([
                    fetchAPI('/api/analytics/summary'),
                    fetchAPI('/api/analytics/timeline?days=7'),
                    fetchAPI('/api/analytics/by-country'),
                    fetchAPI('/api/analytics/recent?limit=50')
                ]);
                
                // Update stats
                document.getElementById('visitsToday').textContent = summary.visits_today;
                document.getElementById('visitsTotal').textContent = summary.visits_total;
                document.getElementById('avgDuration').textContent = formatDuration(summary.avg_duration_seconds);
                document.getElementById('uniqueSessions').textContent = summary.unique_sessions_today;
                
                // Render charts
                renderTimelineChart(timeline);
                renderCountryChart(country);
                
                // Render table
                renderEventsTable(recent);
            } catch (error) {
                console.error('Failed to load dashboard data:', error);
                if (error.message.includes('401')) {
                    logout();
                }
            }
        }
        
        async function fetchAPI(endpoint) {
            const response = await fetch(endpoint, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            
            if (!response.ok) {
                throw new Error(`API error: ${response.status}`);
            }
            
            return response.json();
        }
        
        function renderTimelineChart(data) {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            
            if (timelineChart) {
                timelineChart.destroy();
            }
            
            timelineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => new Date(d.date).toLocaleDateString('he-IL')),
                    datasets: [{
                        label: 'Visits',
                        data: data.map(d => d.visits),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#a0a0a0'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#a0a0a0'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        }
                    }
                }
            });
        }
        
        function renderCountryChart(data) {
            const ctx = document.getElementById('countryChart').getContext('2d');
            
            if (countryChart) {
                countryChart.destroy();
            }
            
            const top10 = data.slice(0, 10);
            
            countryChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(d => d.country || 'Unknown'),
                    datasets: [{
                        label: 'Visits',
                        data: top10.map(d => d.visits),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: '#667eea',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#a0a0a0'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#a0a0a0'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            }
                        }
                    }
                }
            });
        }
        
        function renderEventsTable(events) {
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Event</th>
                            <th>Country</th>
                            <th>City</th>
                            <th>Browser</th>
                            <th>Referrer</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${events.map(event => `
                            <tr>
                                <td>${new Date(event.created_at).toLocaleString('he-IL')}</td>
                                <td>${event.event_type}</td>
                                <td>${event.country || '-'}</td>
                                <td>${event.city || '-'}</td>
                                <td>${parseUserAgent(event.user_agent)}</td>
                                <td>${event.referrer ? shortenReferrer(event.referrer) : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('eventsTable').innerHTML = tableHTML;
        }
        
        function parseUserAgent(ua) {
            if (!ua) return '-';
            
            // Simple browser detection
            if (ua.includes('Chrome')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Edge')) return 'Edge';
            if (ua.includes('curl')) return 'curl';
            
            return 'Other';
        }
        
        function shortenReferrer(referrer) {
            if (!referrer) return '-';
            
            try {
                const url = new URL(referrer);
                return url.hostname;
            } catch {
                return referrer.substring(0, 30);
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '0s';
            
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            
            if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            }
            return `${secs}s`;
        }
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (token) {
                loadDashboardData();
            }
        }, 30000);
    </script>
</body>
</html>
