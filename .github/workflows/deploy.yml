name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue instead of cancel: GitHub keeps only the newest pending run per group,
# so the latest data always deploys and no build dies mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JS syntax in docs/index.html
        run: |
          node -e '
          const fs=require("fs");
          const html=fs.readFileSync("docs/index.html","utf-8");
          const m=html.match(/<script>([\s\S]*?)<\/script>/);
          if(!m){console.error("❌ No <script> block found");process.exit(1)}
          try{new Function(m[1]);console.log("✅ JS syntax OK")}
          catch(e){console.error("❌ JS SYNTAX ERROR:",e.message);process.exit(1)}
          '
  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
